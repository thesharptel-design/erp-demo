name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm run test -- lib/approval-status.test.ts lib/approval-participants.test.ts lib/document-access.test.ts lib/employee-no.test.ts
      - run: npm run test
      - run: npm run build
